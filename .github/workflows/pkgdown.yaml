# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Visit
# https://github.com/r-lib/actions#where-to-find-help
#
# NOTE: articles are PRE-COMPUTED (committed .Rmd rendered from .Rmd.orig), so
# building them needs no TensorFlow. Reference examples (man/*.Rd) run live during
# build_reference(); if any execute greta, add a step to install greta's Python
# stack before "Build site". PRs build but do NOT deploy, so any such failure
# surfaces on the PR before it can reach the live site.
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
