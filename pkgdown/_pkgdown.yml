  - title: variables & distributions
    desc: Create variables and assign probability distributions over greta arrays
    contents:
      - variable
      - distributions
      - distribution
      - mixture
      - joint
  - title: manipulating greta arrays
    desc: Functions and operations for modifying greta arrays
    contents:
      - operators
