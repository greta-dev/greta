url: https://greta-dev.github.io/greta/

development:
  mode: auto

template:
  bootstrap: 5
  opengraph:
    image:
      src: man/figures/name_icon_on_purple.png
      alt: "greta"
  bslib:
    primary: "#A379CC"
    code-bg: "#f4f0f9"
    base_font: {google: "Roboto"}
    heading_font: {google: "Roboto"}
    code_font: {google: "Roboto Mono"}

home:
  sidebar: false
  title: greta — simple and scalable statistical modelling in R
  description: >
    greta lets you write statistical models interactively in native R code,
    then sample from them efficiently using TensorFlow and TensorFlow
    Probability.

navbar:
  structure:
    left: [installation, get-started, reference, examples, analyses, more, news, faq]
    right: [search, forum, github]
  components:
    installation:
      text: Installation
      href: articles/installation.html
    get-started:
      text: get started
      href: articles/get_started.html
    reference:
      text: docs
      href: reference/index.html
    examples:
      text: examples
      href: articles/example_models.html
    analyses:
      text: analyses
      menu:
        - text: eight schools
          href: articles/analyses/eight_schools.html
        - text: election 88
          href: articles/analyses/election_88.html
    more:
      text: more
      menu:
        - text: why 'greta'?
          href: articles/webpages/why_greta.html
        - text: technical details
          href: articles/webpages/technical_details.html
        - text: software
          href: articles/webpages/software.html
        - text: contribute to greta
          href: articles/webpages/contribute.html
    faq:
      text: FAQ
      href: articles/faq.html
    forum:
      icon: fa-comments
      href: https://forum.greta-stats.org
      aria-label: greta forum
    github:
      icon: fa-github
      href: https://github.com/greta-dev/greta
      aria-label: GitHub

reference:
  - title: creating greta arrays
    desc: Create greta arrays representing observed data or fixed values
